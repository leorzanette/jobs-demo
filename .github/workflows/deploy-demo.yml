name: Deploy jobs-demo to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "functions/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "wrangler.toml"
      - ".github/workflows/deploy-demo.yml"

concurrency:
  group: jobs-demo-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=jobs-demo
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
